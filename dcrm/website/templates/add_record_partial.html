{% load static %}
{% comment %}Partial template for HTMX: only the form without full page wrapper {% endcomment %}
<form method="POST" autocomplete="off" class="row g-3" hx-post="{% url 'add_record' %}" hx-target="#spa-container" hx-swap="outerHTML">
    {% csrf_token %}
    <div class="col-md-6">
        <label for="{{ form.nombre.id_for_label }}" class="form-label">Nombre</label>
        {{ form.nombre }}
    </div>
    <div class="col-md-6">
        <label for="{{ form.apellido.id_for_label }}" class="form-label">Apellido</label>
        {{ form.apellido }}
    </div>
    <div class="col-md-6">
        <label for="{{ form.correo.id_for_label }}" class="form-label">Correo Electrónico</label>
        {{ form.correo }}
    </div>
    <div class="col-md-6">
        <label for="{{ form.telefono.id_for_label }}" class="form-label">Teléfono</label>
        {{ form.telefono }}
    </div>
    <div class="col-12">
        <label for="{{ form.direccion.id_for_label }}" class="form-label">Dirección de Residencia</label>
        {{ form.direccion }}
    </div>
    <div class="col-md-5">
        <label for="{{ form.ciudad.id_for_label }}" class="form-label">Ciudad</label>
        {{ form.ciudad }}
    </div>
    <div class="col-md-4">
        <label for="{{ form.estado.id_for_label }}" class="form-label">Estado / Región</label>
        {{ form.estado }}
    </div>
    <div class="col-md-3">
        <label for="{{ form.codigo_postal.id_for_label }}" class="form-label">Código Postal</label>
        {{ form.codigo_postal }}
    </div>
    <div class="col-12 mt-5 flex gap-3">
        <button type="submit" class="bg-gradient-to-r from-indigo-500 to-purple-600 hover:opacity-90 transition text-white px-6 py-3 rounded-xl font-bold flex-1 shadow-lg shadow-indigo-500/25">
            <i class="fas fa-save mr-2"></i> Guardar Cliente
        </button>
        <a href="{% url 'dashboard' %}" class="bg-white/5 hover:bg-white/10 transition text-slate-300 hover:text-white px-6 py-3 rounded-xl font-bold border border-white/5 text-center">
            Cancelar
        </a>
    </div>
</form>
