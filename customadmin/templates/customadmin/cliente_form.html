{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container py-5">
  <h2 class="text-xl font-semibold mb-4">{{ view.object|default:"Nuevo Cliente" }}</h2>
  <form method="post" class="bg-white p-4 rounded-3xl shadow-md">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-amber mt-3">Guardar</button>
    <a href="{% url 'customadmin:cliente_list' %}" class="btn btn-secondary mt-3 ml-2">Cancelar</a>
  </form>
</div>
{% endblock %}
